<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Lockmeout</title>
  <meta name="theme-color" content="#0f1115" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Lockmeout</h1>
    <div id="user-bar">
      <span id="user-email"></span>
      <button id="logout">Log in</button>
    </div>
  </header>

  <main>
    <section id="auth-view">
      <div class="tabs">
        <button class="tab active" data-tab="login">Log in</button>
        <button class="tab" data-tab="signup">Sign up</button>
      </div>

      <form id="login-form" class="auth-form" method="post" action="javascript:void(0)">
        <label>Email <input type="email" name="email" required autocomplete="email" /></label>
        <label>Master password <input type="password" name="password" required autocomplete="current-password" /></label>
        <button type="submit">Log in</button>
        <p class="msg" data-for="login"></p>
      </form>

      <form id="signup-form" class="auth-form" hidden method="post" action="javascript:void(0)">
        <label>Email <input type="email" name="email" required autocomplete="email" /></label>
        <label>Master password <input type="password" name="password" required minlength="10" autocomplete="new-password" /></label>
        <p class="hint">Choose carefully. If you forget it, your secrets are unrecoverable.</p>
        <button type="submit">Create account</button>
        <p class="msg" data-for="signup"></p>
      </form>
    </section>

    <section id="vault-view" hidden>
      <form id="add-form" method="post" action="javascript:void(0)">
        <h2>Lock a new secret</h2>
        <label>Label <input name="label" required maxlength="80" placeholder="e.g. wallet seed" /></label>
        <label>Secret <textarea name="value" required rows="3"></textarea></label>
        <label>Recovery email <input type="email" name="recoveryEmail" autocomplete="off" /></label>
        <label>Recovery email password <input type="password" name="recoveryEmailPassword" autocomplete="off" /></label>
        <fieldset class="schedule-options">
          <legend>Schedule</legend>
          <label class="choice"><input type="radio" name="scheduleMode" value="unlock" checked /> Lock now, unlock later</label>
          <label class="choice"><input type="radio" name="scheduleMode" value="lock" /> Available now, lock later</label>
        </fieldset>
        <label><span id="schedule-at-label">Unlock at</span> <input type="datetime-local" name="scheduleAt" required /></label>
        <p id="schedule-help" class="hint">This secret is sealed immediately and can only be revealed after the scheduled unlock time.</p>
        <button type="submit">Lock it</button>
        <p class="msg" data-for="add"></p>
      </form>

      <h2>Your secrets</h2>
      <ul id="secrets-list" class="empty"></ul>
    </section>
  </main>

  <script type="module" src="/app.js"></script>

  <dialog id="datetime-dialog">
    <form method="dialog">
      <h3 id="datetime-dialog-title">Choose date and time</h3>
      <label>
        <input type="datetime-local" name="datetime" required />
      </label>
      <div class="dialog-actions">
        <button type="submit" value="cancel" class="secondary">Cancel</button>
        <button type="submit" value="ok">OK</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-dialog">
    <form method="dialog">
      <h3 id="confirm-dialog-title">Confirm</h3>
      <p id="confirm-dialog-message"></p>
      <div class="dialog-actions">
        <button type="submit" value="cancel" class="secondary">Cancel</button>
        <button type="submit" value="ok">OK</button>
      </div>
    </form>
  </dialog>
</body>
</html>
